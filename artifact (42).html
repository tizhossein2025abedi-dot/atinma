<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">

    <!-- بخش کلمات کلیدی برای گوگل -->
    <title>آموزش تیزهوشان | ریاضی - علوم - فارسی - مشاوره</title>
    <meta name="description" content="آموزش تخصصی تیزهوشان در دروس ریاضی، علوم، فارسی و مشاوره تحصیلی">

    <!-- بخش جادویی برای شناسایی سریع توسط ربات‌های گوگل (Schema) -->
    <script type="application/ld+json">

      "@context": "https://schema.org",
      "@type": "EducationalOrganization",
      "name": "سایت آموزش تیزهوشان",
      "description": "مرجع آموزشی ریاضی، علوم، فارسی و مشاوره تحصیلی",

        "@type": "OfferCatalog",
        "name": "آموزش‌های تیزهوشان",
        "itemListElement": [
          { "@type": "Offer", "itemOffered": { "@type": "Course", "name": "آموزش ریاضی" } },
          { "@type": "Offer", "itemOffered": { "@type": "Course", "name": "آموزش علوم" } },
          { "@type": "Offer", "itemOffered": { "@type": "Course", "name": "آموزش فارسی" } },
          { "@type": "Offer", "itemOffered": { "@type": "Course", "name": "مشاوره تحصیلی" } }
        ]
      }
    }
    </script>
